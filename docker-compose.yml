services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    volumes:
      - backend_data:/app/data
    environment:
      - PORT=5000
      - DB_PATH=/app/data/data.db
      # Add other env vars as needed
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend_data:
